name: Autograding

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Compile Code
        run: g++ main.cpp -o main

      - name: Test Case 1
        run: |
          ./main < input.txt > output1.txt
          diff -w output1.txt expected.txt

      - name: Test Case 2
        run: |
          ./main < input1.txt > output2.txt
          diff -w output2.txt expected1.txt
